# Gitee Go CI — HermesX Build
# 触发: 推送 tag
triggers:
  push:
    tags:
      - 'v*'

stages:
  - name: build
    label: 构建 HermesX
    jobs:
      - name: build-linux
        label: Linux x64 构建
        runs-on: linux
        steps:
          - name: Checkout
            uses: checkout

          - name: Setup Node
            run: |
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs

          - name: Install Rust
            run: |
              curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              . $HOME/.cargo/env

          - name: Install system deps
            run: |
              apt-get update
              apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

          - name: Build
            run: |
              . $HOME/.cargo/env
              npm ci
              npm run build -- --target x86_64-unknown-linux-gnu

      # ⚠️ Gitee Go 没有 macOS/Windows 构建机
      # .dmg 和 .exe 仍需 GitHub Actions
